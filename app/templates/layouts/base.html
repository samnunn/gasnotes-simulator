<!doctype html>
<html>
    <head>
        <title>{{ data.title }}</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
        />
        <meta
            name="theme-color"
            content="#000000"
            media="(prefers-color-scheme: dark)"
        />
        <meta
            name="theme-color"
            content="#000000"
            media="(prefers-color-scheme: light)"
        />
        <link rel="stylesheet" type="text/css" href="/static/main.css" />
        <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
        <script src="{{ url_for('static', filename='js/socketio.min.js') }}"></script>
        <meta name="color-scheme" content="light only" />
        {% if data.fouc_suppressed %}
            <style>
                body.sim-fouc-suppressed,
                body.sim-fouc-suppressed *,
                body.sim-fouc-suppressed *::before,
                body.sim-fouc-suppressed *::after {
                    transition: none !important;
                    animation: none !important;
                }

                body.sim-fouc-suppressed {
                    opacity: 0;
                }
            </style>
        {% endif %}
    </head>

    <body
        class="sim-fouc-suppressed"
        data-sim-room-id="{{ data.sim_room_id }}"
        data-sim-demo-mode="{{ data.demo | default('false') | lower }}"
    >
        {% block content %}{% endblock %}
    </body>
</html>
